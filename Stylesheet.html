<style>
/* CSS Reset and Typography */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

:root {
  --accent-cyan: #0ea5e9;
  --accent-blue: #2563eb;
  --accent-green: #10b981;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #d946ef;
  
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  
  --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  
  /* Light theme variables */
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f5f9;
  --bg-card: #ffffff;
  --bg-panel: #ffffff;
  --border-color: #e2e8f0;
  --border-glow: rgba(14, 165, 233, 0.15);
  
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #64748b;
  
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}

[data-theme="dark"] {
  /* Dark theme variables */
  --bg-primary: #0f172a;      /* Slate-900 */
  --bg-secondary: #1e293b;    /* Slate-800 */
  --bg-tertiary: #0f172a;     /* Slate-900 for inputs/fields background */
  --bg-card: #1e293b;         /* Slate-800 for cards */
  --bg-panel: #1e293b;        /* Slate-800 for popovers/dropdowns */
  --border-color: #334155;    /* Slate-700 border */
  --border-glow: rgba(14, 165, 233, 0.3);
  
  --text-primary: #f8fafc;    /* Slate-50 text */
  --text-secondary: #cbd5e1;  /* Slate-300 secondary text */
  --text-muted: #94a3b8;      /* Slate-400 muted text */
  
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg-primary);
}
::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--accent-cyan);
}

/* App Container Layout */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* Navigation Sidebar */
.sidebar {
  width: 250px;
  background-color: #0d1424; /* Explicit dark navy sidebar */
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  left: 0;
  top: 0;
  z-index: 100;
  transition: var(--transition-normal);
  color: #f8fafc;
}

.logo-section {
  padding: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: #c8102e; /* Brand red logo icon */
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: #ffffff;
}

.logo-text {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  line-height: 1.2;
  color: #f8fafc;
}

.logo-text span {
  color: #ffffff;
}

.menu-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
}

.menu-group {
  margin-bottom: 20px;
}

.menu-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: #64748b;
  letter-spacing: 1px;
  padding-left: 12px;
  margin-bottom: 8px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  color: #94a3b8;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition-fast);
}

.menu-item:hover {
  background-color: rgba(255,255,255,0.05);
  color: #ffffff;
}

.menu-item.active {
  background-color: rgba(255,255,255,0.08);
  color: #ffffff;
  border-left: 3px solid #c8102e; /* Brand red border active item */
  border-radius: 4px 8px 8px 4px;
}

.menu-item i {
  font-size: 16px;
  width: 20px;
  text-align: center;
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 11px;
  color: #64748b;
  text-align: center;
}

/* Main Content Area */
.main-content {
  margin-left: 250px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  transition: var(--transition-normal);
}

/* App Header */
.app-header {
  height: 70px;
  background-color: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 99;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.header-title-container {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-title-tag {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  color: var(--accent-cyan);
  font-weight: 600;
}

.search-bar {
  display: flex;
  align-items: center;
  background-color: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  padding: 6px 12px;
  border-radius: 20px;
  width: 280px;
}

.search-bar input {
  background: transparent;
  border: none;
  color: var(--text-primary);
  outline: none;
  font-size: 12px;
  margin-left: 8px;
  width: 100%;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.user-selector-container {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  padding: 4px 12px;
  border-radius: 20px;
}

.user-selector-container label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 600;
}

.user-selector-container select {
  background: transparent;
  border: none;
  color: var(--accent-cyan);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.icon-button {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  position: relative;
  transition: var(--transition-fast);
}

.icon-button:hover {
  color: var(--text-primary);
}

#theme-toggle-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-fast);
}
#theme-toggle-btn:hover {
  background-color: var(--bg-tertiary);
}

.badge-dot {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 8px;
  height: 8px;
  background-color: var(--accent-orange);
  border-radius: 50%;
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent-cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--bg-primary);
}

.user-info {
  display: flex;
  flex-direction: column;
}

.user-name {
  font-size: 12px;
  font-weight: 600;
}

.user-role {
  font-size: 10px;
  color: var(--text-muted);
}

/* Page Views Content Layout */
.content-body {
  padding: 32px;
  flex: 1;
}

.page-view {
  display: none;
}

.page-view.active {
  display: block;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Grid Dashboard Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}

.stat-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: var(--transition-normal);
  backdrop-filter: blur(10px);
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
}

.stat-card.cyan::after { background-color: var(--accent-cyan); }
.stat-card.orange::after { background-color: var(--accent-orange); }
.stat-card.blue::after { background-color: var(--accent-blue); }
.stat-card.green::after { background-color: var(--accent-green); }
.stat-card.red::after { background-color: var(--accent-red); }

.stat-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-glow);
  box-shadow: 0 8px 24px rgba(0, 229, 255, 0.05);
}

.stat-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 11px;
  color: var(--text-muted);
}

/* Charts Grid */
.charts-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.chart-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.chart-title {
  font-size: 13px;
  font-weight: 700;
}

.chart-canvas-container {
  height: 220px;
  position: relative;
}

/* Dept Overview and Approval Progress columns */
.dashboard-middle-grid {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 20px;
  margin-bottom: 24px;
}

.panel-card {
  background-color: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
}

/* Dept Overview List */
.dept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}

.dept-mini-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  transition: var(--transition-fast);
}

.dept-mini-card:hover {
  border-color: var(--accent-cyan);
}

.dept-mini-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.dept-mini-count {
  font-size: 10px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.dept-mini-budget {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-cyan);
}

/* Progress approvals status block */
.approval-progress-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.progress-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-tertiary);
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
}

.progress-item-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.progress-dot.cyan { background-color: var(--accent-cyan); }
.progress-dot.orange { background-color: var(--accent-orange); }
.progress-dot.blue { background-color: var(--accent-blue); }
.progress-dot.purple { background-color: var(--accent-purple); }
.progress-dot.green { background-color: var(--accent-green); }

.progress-role {
  font-size: 12px;
  font-weight: 600;
}

.progress-count {
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-cyan);
  border: 1px solid var(--border-color);
}

/* Activity Dashboard Bottom Layout */
.dashboard-bottom-grid {
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 20px;
}

/* Standard Tables Styles */
.table-container {
  overflow-x: auto;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-secondary);
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
  font-size: 12px;
}

th {
  background-color: var(--bg-tertiary);
  padding: 12px 16px;
  font-weight: 700;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.5px;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  color: var(--text-primary);
}

tr:hover td {
  background-color: rgba(255, 255, 255, 0.02);
}

/* Status Pill badge */
.status-pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
}

.status-pill.draft { background-color: var(--bg-tertiary); color: var(--text-secondary); }
.status-pill.pending { background-color: rgba(255, 179, 0, 0.1); color: var(--accent-orange); border: 1px solid rgba(255, 179, 0, 0.2); }
.status-pill.approved { background-color: rgba(0, 230, 118, 0.1); color: var(--accent-green); border: 1px solid rgba(0, 230, 118, 0.2); }
.status-pill.rejected { background-color: rgba(255, 23, 68, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 23, 68, 0.2); }

/* Document Forms Panels */
.form-container {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 28px;
  max-width: 1100px;
  margin: 0 auto;
}

.form-header-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 12px;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.form-group input,
.form-group select,
.form-group textarea {
  background-color: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: 12px;
  outline: none;
  transition: var(--transition-fast);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 2px var(--border-glow);
}

/* Items details table inside form */
.items-table-section {
  margin: 28px 0;
}

.items-table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.form-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition-fast);
}

.form-btn:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
}

.form-btn.submit {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border: none;
  color: var(--bg-primary);
}

.form-btn.submit:hover {
  opacity: 0.9;
  box-shadow: 0 4px 12px rgba(0, 229, 255, 0.2);
}

.form-btn.danger {
  border-color: rgba(255, 23, 68, 0.3);
  color: var(--accent-red);
}

.form-btn.danger:hover {
  background: rgba(255, 23, 68, 0.1);
}

/* Action button icons in items table */
.action-icon-btn {
  background: transparent;
  border: none;
  color: var(--accent-red);
  cursor: pointer;
  font-size: 14px;
}

.action-icon-btn:hover {
  color: #ff5252;
}

/* Workflow Signatures Layout Grid */
.workflow-signatures {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-top: 28px;
  border-top: 1px solid var(--border-color);
  padding-top: 24px;
}

.signature-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  position: relative;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.signature-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
}

.signature-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Brush Script MT', cursive, sans-serif;
  font-size: 18px;
  color: var(--accent-cyan);
  margin: 12px 0;
  height: 50px;
  border-radius: 4px;
}

.signature-area.pending-sign {
  font-family: var(--font-family);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-orange);
  background: rgba(255, 179, 0, 0.05);
  border: 1px dashed rgba(255, 179, 0, 0.2);
  text-transform: uppercase;
}

.signature-area.approved-sign {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent-green);
  background: rgba(0, 230, 118, 0.05);
  border: 1px solid rgba(0, 230, 118, 0.1);
  word-break: break-all;
  padding: 4px;
}

.signature-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-primary);
}

.signature-date {
  font-size: 9px;
  color: var(--text-muted);
}

/* Modals Overlay style */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(11, 17, 30, 0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition-normal);
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.modal-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  width: 500px;
  max-width: 90%;
  padding: 24px;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
  transform: scale(0.9);
  transition: var(--transition-normal);
}

.modal-overlay.active .modal-card {
  transform: scale(1);
}

.modal-header {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
}

.modal-body {
  margin-bottom: 24px;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

/* Filter panel style */
.filter-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  align-items: flex-end;
}

/* Tabs list */
.tab-list {
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 20px;
}

.tab-item {
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition-fast);
}

.tab-item:hover {
  color: var(--text-primary);
}

.tab-item.active {
  color: var(--accent-cyan);
  border-bottom-color: var(--accent-cyan);
}
