<script>
// API FALLBACK INTERCEPTOR FOR VERCEL DEPLOYMENT
(function() {
  const isGAS = (typeof google !== 'undefined' && google.script && google.script.run);
  if (!isGAS) {
    const GAS_WEB_APP_URL = localStorage.getItem('gas_web_app_url') || '';
    
    window.google = {
      script: {
        run: {
          withSuccessHandler: function(successCallback) {
            this.success = successCallback;
            return this;
          },
          withFailureHandler: function(failureCallback) {
            this.failure = failureCallback;
            return this;
          }
        }
      }
    };
    
    const apiActions = [
      'getDashboardData', 'getApprovalRequests', 'processApproval', 
      'getDocumentHistory', 'saveUserSignature', 'createUserRecord', 
      'editUserRecord', 'deleteUserRecord', 'getDropdownData',
      'saveBudgetLive', 'deleteBudgetLive', 'importBudgetLiveCSV',
      'isPMOnLeave', 'getApprovalSteps'
    ];
    
    apiActions.forEach(action => {
      window.google.script.run[action] = function(...args) {
        const success = this.success;
        const failure = this.failure;
        
        if (!GAS_WEB_APP_URL) {
          if (failure) failure('Google Apps Script URL belum dikonfigurasi. Silakan klik ikon settings (sliders) di kanan atas untuk menyetel URL.');
          return;
        }
        
        fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8' // Prevents CORS preflight OPTIONS request
          },
          body: JSON.stringify({
            action: action,
            args: args
          })
        })
        .then(response => response.json())
        .then(res => {
          if (res.success) {
            if (success) success(res.data);
          } else {
            if (failure) failure(res.error);
          }
        })
        .catch(err => {
          if (failure) failure(err.toString());
        });
      };
    });
  }
})();

// Theme Toggle Logic
function toggleTheme(event) {
  if (event) event.stopPropagation();
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-toggle-icon');
  if (icon) {
    if (theme === 'dark') {
      icon.className = 'fas fa-sun';
      icon.style.color = 'var(--accent-orange)';
    } else {
      icon.className = 'fas fa-moon';
      icon.style.color = '';
    }
  }
}

// Initialize application on load
function initOnLoad() {
  checkApiConnection();
  checkLoginSession();
  setupNavigation();
  setupFormHandlers();
  setupSignatureCanvas();
  
  // Sync Dark/Light Mode toggle icon on load
  const savedTheme = localStorage.getItem('theme') || 'light';
  updateThemeIcon(savedTheme);
  
  if (window.Chart) {
    Chart.defaults.color = savedTheme === 'dark' ? '#cbd5e1' : '#475569';
  }
}

if (document.readyState === 'loading') {

/**
 * SINGLE PAGE APPLICATION NAVIGATION
 */
function setupNavigation() {
  const menuItems = document.querySelectorAll('.menu-item');
  menuItems.forEach(item => {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      
      const targetView = this.getAttribute('data-view');
      
      // Protect Admin views
      const isAdmin = currentUser && currentUser.role === 'Administrator';
      if ((targetView === 'master-user' || targetView === 'matrix') && !isAdmin) {
        showToast('Akses ditolak: Menu ini hanya untuk Administrator.', true);
        return;
      }

      // Remove active states from sidebar
      menuItems.forEach(m => m.classList.remove('active'));
      this.classList.add('active');
      
      // Switch view panels
      const views = document.querySelectorAll('.page-view');
      views.forEach(v => v.classList.remove('active'));

      
      const targetPanel = document.getElementById('view-' + targetView);
      if (targetPanel) {
        targetPanel.classList.add('active');
        
        // Trigger specific loaders
        if (targetView === 'dashboard') loadDashboard();
        else if (targetView === 'pr-new') resetPRForm();
        else if (targetView === 'pd-new') resetPDForm();
        else if (targetView === 'approval') loadApprovalCenter();
        else if (targetView === 'history') loadHistoryCenter();
        else if (targetView === 'budget') { loadBudgetDashboard(); loadBudgetTahunan(); }
        else if (targetView === 'pdf-archive') initPDFArchivePage();
        else if (targetView === 'audit') loadAuditTrail();
        else if (targetView === 'master-dept' || targetView === 'master-coa' || targetView === 'master-user' || targetView === 'matrix') loadMasterDataTables(targetView);
      }
    });
  });
}

/**
 * FORM HANDLING: PURCHASE REQUEST & PENGAJUAN DANA
 */
function setupFormHandlers() {
  // PR Add Item row trigger
  document.getElementById('btn-pr-add-item').addEventListener('click', addPRItemRow);
  
  // PR Form Submit
  document.getElementById('pr-form').addEventListener('submit', function(e) {
    e.preventDefault();
    submitPRDocument();
  });
  
  // PD Form Submit
  document.getElementById('pd-form').addEventListener('submit', function(e) {
    e.preventDefault();
    submitPDDocument();
  });
}

function addPRItemRow() {
  const tbody = document.getElementById('pr-items-tbody');
  const rowCount = tbody.rows.length + 1;
  const tr = document.createElement('tr');
  
  // Populate options for COA select
  let coaOptions = dropdownData.coas ? dropdownData.coas.map(c => `<option value="${c.Code}">${c.Code} - ${c.Name}</option>`).join('') : '';
  let ceOptions = dropdownData.costElements ? dropdownData.costElements.map(e => `<option value="${e.Code}">${e.Code} - ${e.Name}</option>`).join('') : '';
  
  tr.innerHTML = `
    <td>${rowCount}</td>
    <td>
      <select class="form-coa" required onchange="onCOAChange(this)">
        <option value="">Select COA</option>
        ${coaOptions}
      </select>
    </td>
    <td><input type="text" class="form-part" placeholder="Part Number"></td>
    <td><input type="text" class="form-desc" placeholder="Description" required></td>
    <td>
      <select class="form-ce">
        <option value="">Select Element</option>
        ${ceOptions}
      </select>
    </td>
    <td><input type="number" class="form-qty" value="1" min="1" required oninput="calculateRowTotal(this)"></td>
    <td><input type="text" class="form-uom" value="Unit" required></td>
    <td><input type="number" class="form-price" value="0" min="0" required oninput="calculateRowTotal(this)"></td>
    <td class="row-total-val" style="font-weight: 700;">Rp 0</td>
    <td>
      <button type="button" class="action-icon-btn" onclick="removePRItemRow(this)">
        <i class="fas fa-trash"></i>
      </button>
    </td>
  `;
  tbody.appendChild(tr);
}

function removePRItemRow(btn) {
  const row = btn.closest('tr');
  row.remove();
  reindexPRRows();
  calculateGrandTotal();
}

function reindexPRRows() {
  const tbody = document.getElementById('pr-items-tbody');
  Array.from(tbody.rows).forEach((row, idx) => {
    row.cells[0].innerText = idx + 1;
  });
}

function onCOAChange(select) {
  const row = select.closest('tr');
  const code = select.value;
  const matched = dropdownData.coas ? dropdownData.coas.find(c => c.Code === code) : null;
  if (matched) {
    row.querySelector('.form-desc').value = matched.Name;
  }
}

function calculateRowTotal(input) {
  const row = input.closest('tr');
  const qty = parseFloat(row.querySelector('.form-qty').value) || 0;
  const price = parseFloat(row.querySelector('.form-price').value) || 0;
  const total = qty * price;
  row.querySelector('.row-total-val').innerText = formatRupiah(total);
  calculateGrandTotal();
}

function calculateGrandTotal() {
  let grandTotal = 0;
  const rows = document.querySelectorAll('#pr-items-tbody tr');
  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('.form-qty').value) || 0;
    const price = parseFloat(row.querySelector('.form-price').value) || 0;
    grandTotal += qty * price;
  });
  
  document.getElementById('pr-grand-total').innerText = formatRupiah(grandTotal);
}

function resetPRForm() {
  document.getElementById('pr-form').reset();
  document.getElementById('pr-items-tbody').innerHTML = '';
  document.getElementById('pr-grand-total').innerText = 'Rp 0';
  document.getElementById('pr-date').value = new Date().toISOString().substring(0, 10);
  
  // Set requester to current user
  document.getElementById('pr-requester').value = currentUser.fullname;
  document.getElementById('pr-department').value = currentUser.department;
  
  // Add initial row
  addPRItemRow();
}

function getFileData(input) {
  return new Promise((resolve) => {
    const file = input && input.files ? input.files[0] : null;
    if (!file) {
      resolve({ data: '', name: '' });
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      resolve({ data: e.target.result, name: file.name });
    };
    reader.readAsDataURL(file);
  });
}

function submitPRDocument() {
  const rows = document.querySelectorAll('#pr-items-tbody tr');
  if (rows.length === 0) {
    alert("Please add at least one line item.");
    return;
  }
  
  const attachmentInput = document.getElementById('pr-attachment-file');
  getFileData(attachmentInput).then(fileInfo => {
    const metadata = {
      type: 'PR',
      date: document.getElementById('pr-date').value,
      department: document.getElementById('pr-department').value,
      priority: document.getElementById('pr-priority').value,
      inventoryType: document.getElementById('pr-inventory-type').value,
      purchaseCategory: document.getElementById('pr-category').value,
      subject: document.getElementById('pr-subject').value,
      requester: currentUser.fullname,
      userFor: document.getElementById('pr-user-for').value,
      attachment: fileInfo.data,
      attachmentName: fileInfo.name,
      budgetCapture: ''
    };
    
    const items = [];
    rows.forEach(row => {
      items.push({
        coa: row.querySelector('.form-coa').value,
        partNumber: row.querySelector('.form-part').value,
        description: row.querySelector('.form-desc').value,
        costElement: row.querySelector('.form-ce').value,
        quantity: row.querySelector('.form-qty').value,
        uom: row.querySelector('.form-uom').value,
        price: row.querySelector('.form-price').value
      });
    });
    
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) {
      showLoading(true); // Keep loading visible while page redirects/updates
      google.script.run.withSuccessHandler(function(data) {
        showLoading(false);
        if (res.success) {
          showToast('PR Submitted Successfully: ' + res.docNumber);
          resetPRForm();
          // Clear file input
          if (attachmentInput) attachmentInput.value = '';
          
          // Refresh dashboard data
          loadDashboardData(data);
          document.querySelector('[data-view="dashboard"]').click(); // Return to dashboard
        } else {
          alert("Submission Error: " + res.error);
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        alert("Refresh Error: " + err.toString());
      }).getDashboardData();
    }).withFailureHandler(function(err) {
      showLoading(false);
      alert("Script Error: " + err.toString());
    }).submitRequest(metadata, items);
  });
}

  document.getElementById('pd-requester').value = currentUser.fullname;
  document.getElementById('pd-department').value = currentUser.department;

  }).getSuggestedPDNumber(currentUser.department);

  if (previewContainer) previewContainer.style.display = 'none';
  const previewImg = document.getElementById('pd-budget-capture-preview');

function submitPDDocument() {
  const attachmentInput = document.getElementById('pd-attachment-file');
  const budgetCaptureInput = document.getElementById('pd-budget-capture-file');
  
  Promise.all([getFileData(attachmentInput), getFileData(budgetCaptureInput)]).then(filesInfo => {
    const attachmentFile = filesInfo[0];
    const budgetCaptureFile = filesInfo[1];
    
    const customPmSelect = document.getElementById('pd-custom-pm').value;
    const customPmManual = document.getElementById('pd-custom-pm-manual').value;
    const customPm = customPmSelect === 'custom' ? customPmManual : customPmSelect;
    
    const metadata = {
      type: 'PD',
      docNumber: document.getElementById('pd-doc-no').value,
      date: document.getElementById('pd-date').value,
      department: document.getElementById('pd-department').value,
      priority: document.getElementById('pd-priority').value,
      subject: document.getElementById('pd-subject').value,
      requester: currentUser.fullname,
      userFor: document.getElementById('pd-user-for').value,
      attachment: attachmentFile.data,
      attachmentName: attachmentFile.name,
      budgetCapture: budgetCaptureFile.data,
      customPm: customPm
    };
    
    const items = [{
      coa: 'PD-COA',
      description: document.getElementById('pd-subject').value,
      quantity: 1,
      uom: 'Lot',
      price: document.getElementById('pd-nominal').value
    }];
    
    showLoading(true);
    google.script.run.withSuccessHandler(function(res) {
      showLoading(true);
      google.script.run.withSuccessHandler(function(data) {
        showLoading(false);
        if (res.success) {
          showToast('PD Submitted Successfully: ' + res.docNumber);
          resetPDForm();
          if (attachmentInput) attachmentInput.value = '';
          if (budgetCaptureInput) budgetCaptureInput.value = '';
          
          loadDashboardData(data);
          document.querySelector('[data-view="dashboard"]').click();
        } else {
          alert("Submission Error: " + res.error);
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        alert("Refresh Error: " + err.toString());
      }).getDashboardData();
    }).withFailureHandler(function(err) {
      showLoading(false);
      alert("Script Error: " + err.toString());
    }).submitRequest(metadata, items);
  });
}

function loadDashboard() {
  showLoading(true);
  google.script.run.withSuccessHandler(function(data) {
    showLoading(false);
    
    // KPI Values
    document.getElementById('kpi-total-pd').innerText = formatRupiah(data.kpis.totalPD);
    document.getElementById('kpi-count-pd').innerText = data.kpis.countPD + " Dokumen";
    document.getElementById('kpi-total-pr').innerText = formatRupiah(data.kpis.totalPR);
    document.getElementById('kpi-count-pr').innerText = data.kpis.countPR + " Dokumen";
    
    document.getElementById('kpi-pending').innerText = data.kpis.pendingCount;
    document.getElementById('kpi-approved').innerText = data.kpis.approvedCount;
    document.getElementById('kpi-rejected').innerText = data.kpis.rejectedCount;
    document.getElementById('kpi-budget-avail').innerText = formatRupiah(data.kpis.budgetAvailable);
    document.getElementById('kpi-budget-total').innerText = "dari " + formatRupiah(data.kpis.totalBudgetLimit);
    
    // Mini progress counters
    document.getElementById('count-head').innerText = data.approvalProgress.headDept + " Pending";
    document.getElementById('count-pm').innerText = data.approvalProgress.projectManager + " Pending";
    document.getElementById('count-finance').innerText = data.approvalProgress.finance + " Pending";
    document.getElementById('count-cc').innerText = data.approvalProgress.costControl + " Pending";
    document.getElementById('count-gm').innerText = data.approvalProgress.gmCfo + " Pending";
    
    // Department Overview Grid
    renderDepartmentOverview(data.deptOverview);
    
    // Recent Activities Table
    renderRecentActivities(data.recentActivities);
    
    // Notifications list
    renderNotificationsList(data.notifications);
    
    // Render Dashboard Charts
    renderDashboardCharts(data.charts, data.kpis.budgetUtilPercent);
    
  }).withFailureHandler(function(err) {
    showLoading(false);
    console.error("Dashboard error: ", err);
  }).getDashboardData();
}

function renderDepartmentOverview(list) {
  const container = document.getElementById('dept-overview-grid');
  container.innerHTML = '';
  list.forEach(dept => {
    const card = document.createElement('div');
    card.className = 'dept-mini-card';
    card.innerHTML = `
      <div class="dept-mini-name">${dept.dept}</div>
      <div class="dept-mini-count">PD: ${dept.pdCount} | PR: ${dept.prCount}</div>
      <div class="dept-mini-budget">${formatRupiah(dept.budget)}</div>
    `;
    container.appendChild(card);
  });
}

function renderRecentActivities(activities) {
  const tbody = document.getElementById('recent-activities-tbody');
  tbody.innerHTML = '';
  if (activities.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No recent activities</td></tr>`;
    return;
  }
  
  activities.forEach((act, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx + 1}</td>
      <td><span class="status-pill ${act.type.toLowerCase() === 'pr' ? 'pending' : 'approved'}">${act.type}</span></td>
      <td>${act.docNumber}</td>
      <td>${act.subject}</td>
      <td>${act.requester}</td>
      <td><span class="status-pill ${act.status.toLowerCase()}">${act.status}</span></td>
      <td>${act.date}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderNotificationsList(logs) {
  // 1. Dashboard panel
  const container = document.getElementById('notif-list-container');
  if (container) {
    container.innerHTML = '';
    if (!logs || logs.length === 0) {
      container.innerHTML = '<div style="padding: 15px; color: var(--text-secondary); text-align: center; font-size: 11px;">Belum ada notifikasi</div>';
    } else {
      logs.forEach(log => {
        const div = document.createElement('div');
        div.className = 'notif-row';
        div.innerHTML = `
          <div class="notif-icon"><i class="fas fa-bell"></i></div>
          <div class="notif-details">
            <div class="notif-title"><strong>${log.user}</strong> ${log.activity} (${log.docNumber})</div>
            <div class="notif-time">${log.timeAgo}</div>
          </div>
        `;
        container.appendChild(div);
      });
    }
  }

  // 2. Bell Dropdown list
  const dropdownList = document.getElementById('notif-dropdown-list');
  if (dropdownList) {
    dropdownList.innerHTML = '';
    if (!logs || logs.length === 0) {
      dropdownList.innerHTML = '<div style="padding: 16px; color: var(--text-secondary); text-align: center; font-size: 11px;">Belum ada notifikasi</div>';
    } else {
      logs.forEach(log => {
        const div = document.createElement('div');
        div.style.display = 'flex';

// Procedural Elegant Electronic Signature Generator (Procedural curves lines SVG)
function generateProceduralSignature(name) {
  if (!name) return '';
  // Convert name initials/parts to deterministic random path offsets
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  
  const getOffset = (seed, scale) => {
    return Math.sin(seed + hash) * scale;
  };
  
  // Starting curves path
  let path = `M 15,${25 + getOffset(1, 4)} `;
  path += `Q 35,${12 + getOffset(2, 6)} 50,${25 + getOffset(3, 4)} `;
  path += `T 85,${20 + getOffset(4, 5)} `;
  path += `Q 105,${38 + getOffset(5, 5)} 120,${22 + getOffset(6, 4)} `;
  
  // Elegant underscore loop loop
  path += `M 10,${30 + getOffset(7, 3)} `;
  path += `C 50,${45 + getOffset(8, 2)} 100,${40 + getOffset(9, 2)} 135,${32 + getOffset(10, 3)}`;
  
  return `
    <svg class="svg-signature" viewBox="0 0 150 50">
      <path d="${path}" />
      <text x="35" y="46" font-family="'Outfit', sans-serif" font-size="8" fill="#6b7280" opacity="0.6">e-Signed by ${name}</text>
    </svg>
  `;
}

    } else {

      };

function createSignatureBoxHTML(title, sigObj, isRequester) {
  const div = document.createElement('div');
  div.className = 'signature-box';
  
  let sigArea = '';
  let statusText = title.toUpperCase();
  let dateText = '';
  let signerName = '-';
  
  if (sigObj && sigObj.status === 'SUBMITTED') {
    if (sigObj.signatureText && sigObj.signatureText.indexOf('data:image') === 0) {
      sigArea = `<div class="signature-area"><img src="${sigObj.signatureText}" style="max-height:45px; max-width:140px; object-fit:contain;" /></div>`;
    } else {
      sigArea = `<div class="signature-area text-sign">${sigObj.name}</div>`;
    }
    signerName = sigObj.name;
    dateText = new Date(sigObj.date).toLocaleDateString();
  } else if (sigObj && sigObj.status === 'APPROVED') {
    if (sigObj.signatureText && sigObj.signatureText.indexOf('data:image') === 0) {
      sigArea = `<div class="signature-area"><img src="${sigObj.signatureText}" style="max-height:45px; max-width:140px; object-fit:contain;" /></div>`;
    } else {
      sigArea = `<div class="signature-area">${generateProceduralSignature(sigObj.name)}</div>`;
    }
    signerName = sigObj.name;
    dateText = new Date(sigObj.date).toLocaleDateString() + ' ' + new Date(sigObj.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  } else if (sigObj && sigObj.status === 'REJECTED') {
    sigArea = `<div class="signature-area pending-sign" style="color:var(--accent-red); background:rgba(255,23,68,0.05); border-color:var(--accent-red);">REJECTED</div>`;
    signerName = sigObj.name;
    dateText = new Date(sigObj.date).toLocaleDateString();
  } else {
    sigArea = `<div class="signature-area pending-sign">PENDING</div>`;
  }
  
  div.innerHTML = `
    <div class="signature-title">${title}</div>
    ${sigArea}
    <div>
      <div class="signature-name">${signerName}</div>
      <div class="signature-date">${dateText}</div>
    </div>
  `;
  return div;
}

function getLocalApprovalSteps(docType, department, amount) {
  if (!dropdownData || !dropdownData.matrix) {
    return docType === 'PD' ? ["Project Manager", "Finance"] : ["Supervisor", "Finance", "Project Manager"];
  }
  const matched = dropdownData.matrix.filter(m => {
    const isDocTypeMatch = m.DocType === docType;
    const isDeptMatch = m.Department === 'ALL' || m.Department === department;
    const min = parseFloat(m.MinAmount) || 0;
    const max = parseFloat(m.MaxAmount) || Infinity;
    const isAmountMatch = amount >= min && amount <= max;
    return isDocTypeMatch && isDeptMatch && isAmountMatch;
  });
  matched.sort((a, b) => {
    if (a.Department !== 'ALL' && b.Department === 'ALL') return -1;
    if (a.Department === 'ALL' && b.Department !== 'ALL') return 1;
    return 0;
  });
  if (matched.length > 0) {
    return matched[0].Steps.split(',').map(s => s.trim());
  }
  return docType === 'PD' ? ["Project Manager", "Finance"] : ["Supervisor", "Finance", "Project Manager"];
}

function importBudgetLiveCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text  = e.target.result.replace(/^\uFEFF/, '');
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return alert('File CSV kosong atau tidak valid');

      const headers   = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
      const deptIdx   = headers.findIndex(h => h.includes('department') || h.includes('dept'));
      const yearIdx   = headers.findIndex(h => h.includes('tahun') || h.includes('year'));
      const annualIdx = headers.findIndex(h => h.includes('annual'));
      const actualIdx = headers.findIndex(h => h.includes('actual'));

      if (deptIdx < 0 || yearIdx < 0 || annualIdx < 0) {
        return alert('Header CSV tidak sesuai. Pastikan ada kolom: Department, Tahun, Annual Budget');
      }

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.replace(/"/g, '').trim());
        const dept   = cols[deptIdx] || '';
        const year   = parseInt(cols[yearIdx]) || 0;
        const annual = parseFloat(cols[annualIdx]) || 0;
        const actual = actualIdx >= 0 ? parseFloat(cols[actualIdx]) || 0 : 0;
        if (!dept || !year) continue;
        rows.push({ dept, year, annualBudget: annual, actualBudget: actual });
      }

      if (!rows.length) return alert('Tidak ada data valid di file CSV');
      if (!confirm(`Import ${rows.length} baris data budget? Data akan ditambahkan ke yang sudah ada.`)) return;

      showLoading(true);
      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          if (!res.success) { alert('Gagal import: ' + (res.error || '')); return; }
          alert(`${res.count} data budget berhasil diimport`);
          loadBudgetTahunan();
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          alert(err.toString());
        })
        .importBudgetData(rows);
    } catch(err) {
      alert('Gagal membaca file: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

/**
 * CUSTOM SIGNATURE CANVAS CONTROLLERS
 */
let canvas, ctx;
let isDrawing = false;
let lastX = 0;
let lastY = 0;

function setupSignatureCanvas() {
  canvas = document.getElementById('signature-canvas');
  if (!canvas) return;
  ctx = canvas.getContext('2d');
  
  ctx.strokeStyle = '#121b2d';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  canvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    [lastX, lastY] = getMousePos(canvas, e);
  });
  canvas.addEventListener('mousemove', drawStroke);
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseout', () => isDrawing = false);
  
  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    isDrawing = true;
    const touch = e.touches[0];
    [lastX, lastY] = getTouchPos(canvas, touch);
    e.preventDefault();
  }, { passive: false });
  
  canvas.addEventListener('touchmove', (e) => {
    if (!isDrawing) return;
    const touch = e.touches[0];
    const [x, y] = getTouchPos(canvas, touch);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    [lastX, lastY] = [x, y];
    e.preventDefault();
  }, { passive: false });
  
  canvas.addEventListener('touchend', () => isDrawing = false);
}

function getMousePos(canvasDom, mouseEvent) {
  const rect = canvasDom.getBoundingClientRect();
  return [
    mouseEvent.clientX - rect.left,
    mouseEvent.clientY - rect.top
  ];
}

function getTouchPos(canvasDom, touchEvent) {
  const rect = canvasDom.getBoundingClientRect();
  return [
    touchEvent.clientX - rect.left,
    touchEvent.clientY - rect.top
  ];
}

function drawStroke(e) {
  if (!isDrawing) return;
  const [x, y] = getMousePos(canvas, e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  [lastX, lastY] = [x, y];
}

function clearSignatureCanvas() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const uploadInput = document.getElementById('signature-upload');
  if (uploadInput) uploadInput.value = '';
}

function handleSignatureUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      if (!ctx || !canvas) return;
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Calculate fit dimensions
      const wrh = img.width / img.height;
      let newWidth = canvas.width;
      let newHeight = newWidth / wrh;
      if (newHeight > canvas.height) {
        newHeight = canvas.height;
        newWidth = newHeight * wrh;
      }
      
      const xOffset = (canvas.width - newWidth) / 2;
      const yOffset = (canvas.height - newHeight) / 2;
      
      ctx.drawImage(img, xOffset, yOffset, newWidth, newHeight);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  document.getElementById('signature-modal').classList.add('active');

/**
 * PDF GENERATION HANDLERS
 */
function genSVGSig(name) {
  let h = 0;
  for(let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const g = (s, sc) => Math.sin(s + h) * sc;
  const path = `M 10,${23+g(1,4)} Q 28,${12+g(2,7)} 46,${23+g(3,4)} T 80,${20+g(4,6)} Q 98,${36+g(5,5)} 115,${22+g(6,4)} M 7,${29+g(7,3)} C 45,${42+g(8,2)} 90,${40+g(9,2)} 126,${30+g(10,3)}`;
  return `<svg class="esig" viewBox="0 0 135 48"><path d="${path}"/></svg>`;
}

function buildPaperHTML(doc) {
  const sigs = doc.sigs;

    if (!dateStr) return '-';

  };
  
  const formatCurrency = function(num) {

  };
  
  const terbilangText = terbilangLocal(doc.nominal);

    const u = dropdownData.users.find(user => user.Role === role && (dept ? user.Department === dept : true));
    return u ? u.Fullname : defaultName;
  };

  const getSigBoxData = function(sigObj, roleKey) {
    let sigContent = '';
    let name = (sigObj && sigObj.name) ? sigObj.name : '-';
    let date = '';
    let statusClass = 'pend';
    let statusText = 'PENDING';
    
    if (sigObj && (sigObj.status === 'SUBMITTED' || sigObj.status === 'APPROVED')) {
      date = formatDate(sigObj.date);
      statusClass = 'app';
      statusText = sigObj.status === 'SUBMITTED' ? 'SUBMITTED' : 'APPROVED';
      if (sigObj.signatureText && sigObj.signatureText.indexOf('data:image') === 0) {
        sigContent = '<img src="' + sigObj.signatureText + '" style="max-height:40px; max-width:110px; object-fit:contain;" />';
      } else if (sigObj.signature && sigObj.signature.indexOf('data:image') === 0) {
        sigContent = '<img src="' + sigObj.signature + '" style="max-height:40px; max-width:110px; object-fit:contain;" />';
      } else {
        sigContent = genSVGSig(sigObj.name).replace('class="esig"','style="width:110px;height:38px"').replace('stroke:var(--cy)','stroke:#1565c0');
      }
    } else if (sigObj && sigObj.status === 'REJECTED') {
      date = formatDate(sigObj.date);
      statusClass = 'rej';
      statusText = 'REJECTED';
      sigContent = '<span style="color:#ff1744; font-weight:bold; font-size:9px;">REJECTED</span>';
    } else if (roleKey) {
      const signerName = name !== '-' ? name : getSignerName(roleKey, '', '');
      if (dropdownData && dropdownData.users) {
        const dbUser = dropdownData.users.find(user => user.Fullname === signerName);
        if (dbUser && dbUser.Signature && dbUser.Signature.indexOf('data:image') === 0) {
          sigContent = '<img src="' + dbUser.Signature + '" style="max-height:40px; max-width:110px; object-fit:contain; opacity:0.9;" />';
        }
      }
    }
    
    return {
      content: sigContent,
      name: name,
      date: date,
      statusText: statusText,
      statusClass: statusClass
    };
  };

  if (doc.type === 'PR') {
    let itemsRowsHTML = '';
    doc.items.forEach(function(item, idx) {
      itemsRowsHTML += '<tr>' +
        '<td style="border:1px solid #111; padding:5px; text-align:center;">' + (idx + 1) + '</td>' +

function triggerPDFGeneration() {
  if (!activeReviewDoc) return;
  
  const doc = {
    type: activeReviewDoc.metadata.type,
    docNumber: activeReviewDoc.metadata.docNumber,
    date: activeReviewDoc.metadata.date,
    dept: activeReviewDoc.metadata.department,
    priority: activeReviewDoc.metadata.priority,
    inventoryType: activeReviewDoc.metadata.inventoryType,
    purchaseCategory: activeReviewDoc.metadata.purchaseCategory,
    subject: activeReviewDoc.metadata.subject,
    requester: activeReviewDoc.metadata.requester,
    nominal: activeReviewDoc.metadata.nominal,
    userFor: activeReviewDoc.metadata.userFor,
    attachment: activeReviewDoc.metadata.attachment,
    attachmentName: activeReviewDoc.metadata.attachmentName,
    budgetCapture: activeReviewDoc.metadata.budgetCapture,
    items: activeReviewDoc.items,
    budget: activeReviewDoc.budget,
    sigs: activeReviewDoc.signatures
  };

  showLoading(true);
  
  const targetWidth = doc.type === 'PD' ? 1080 : 800;

  // Temporarily force body/html overflow and widths to prevent layout folding and clipping
  const origBodyOverflow = document.body.style.overflow;
  const origBodyOverflowX = document.body.style.overflowX;
  const origHtmlOverflow = document.documentElement.style.overflow;
  const origHtmlOverflowX = document.documentElement.style.overflowX;
  const origBodyWidth = document.body.style.width;
  const origBodyMinWidth = document.body.style.minWidth;
  const origHtmlWidth = document.documentElement.style.width;
  const origHtmlMinWidth = document.documentElement.style.minWidth;
  
  document.body.style.overflow = 'visible';
  document.body.style.overflowX = 'visible';
  document.documentElement.style.overflow = 'visible';
  document.documentElement.style.overflowX = 'visible';
  document.body.style.width = targetWidth + 'px';
  document.body.style.minWidth = targetWidth + 'px';
  document.documentElement.style.width = targetWidth + 'px';
  document.documentElement.style.minWidth = targetWidth + 'px';
  
  // Create a hidden parent wrapper at (0,0) with proper layout width to prevent content folding
  const wrapper = document.createElement('div');
  wrapper.style.position = 'absolute';
  wrapper.style.left = '0';
  wrapper.style.top = '0';
  wrapper.style.width = targetWidth + 'px';
  wrapper.style.height = 'auto';
  wrapper.style.overflow = 'visible';
  wrapper.style.zIndex = '-9999';
  wrapper.style.pointerEvents = 'none';
  
  // Create the clean container to be captured
  const container = document.createElement('div');
  container.style.width = targetWidth + 'px';
  container.style.background = '#fff';
  container.innerHTML = buildPaperHTML(doc);
  
  wrapper.appendChild(container);
  document.body.appendChild(wrapper);
  
  const orientation = doc.type === 'PD' ? 'landscape' : 'portrait';
  const opt = {
    margin:       [8, 8, 8, 8],
    filename:     doc.docNumber.replace(/\//g, '_') + '.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { 
      scale: 2, 
      useCORS: true, 
      scrollY: 0,
      width: targetWidth,
      windowWidth: targetWidth
    },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: orientation }
  };
  
  const pdfContainers = container.querySelectorAll('.pdf-rendering-container');
  const promises = [];
  pdfContainers.forEach(c => {
    const base64 = c.getAttribute('data-pdf');
    if (base64) {
      promises.push(renderPDFToCanvases(base64, c));
    }
  });

  Promise.all(promises).then(() => {
    const hasAttachment = !!container.querySelector('.page-break-preview');
    if (doc.type === 'PD' && hasAttachment) {
      // Mixed orientation: Landscape Page 1 (PD Form) + Portrait Page 2+ (Attachments)
      const pdFormElement = container.querySelector('.pd-landscape');
      const attachmentContainer = container.querySelector('.page-break-preview');
      
      html2canvas(pdFormElement, {
        scale: 2,
        useCORS: true,
        width: 1080,
        windowWidth: 1080
      }).then(function(pdCanvas) {
        const jsPDFClass = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
        const pdf = new jsPDFClass({
          orientation: 'landscape',
          unit: 'px',
          format: [1080, 762]
        });
        
        pdf.addImage(pdCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 1080, 762);
        
        const canvases = attachmentContainer.querySelectorAll('canvas');
        if (canvases.length > 0) {
          // PDF attachment pages (canvases generated from renderPDFToCanvases)
          canvases.forEach(function(canvas) {
            pdf.addPage([800, 1130], 'portrait');
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 800, 1130);
          });
          
          pdf.save(opt.filename);
          cleanup();
        } else {
          // Image attachment. Render attachmentContainer using html2canvas as a portrait page
          attachmentContainer.style.width = '800px';
          attachmentContainer.style.margin = '0 auto';
          
          html2canvas(attachmentContainer, {
            scale: 2,
            useCORS: true,
            width: 800,
            windowWidth: 800
          }).then(function(attachCanvas) {
            pdf.addPage([800, 1130], 'portrait');
            pdf.addImage(attachCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 800, 1130);
            
            pdf.save(opt.filename);
            cleanup();
          }).catch(handlePdfError);
        }
      }).catch(handlePdfError);
    } else {
      // Standard html2pdf flow
      html2pdf().from(container).set(opt).save().then(() => {
        showLoading(false);
        restoreStyles();
        showToast('PDF berhasil diunduh: ' + opt.filename);
      }).catch(handlePdfError);
    }
    
    function cleanup() {
      showLoading(false);
      restoreStyles();
      showToast('PDF berhasil diunduh: ' + opt.filename);
    }
    
    function restoreStyles() {
      if (wrapper.parentNode) {
        wrapper.parentNode.removeChild(wrapper);
      }
      document.body.style.overflow = origBodyOverflow;
      document.body.style.overflowX = origBodyOverflowX;
      document.documentElement.style.overflow = origHtmlOverflow;
      document.documentElement.style.overflowX = origHtmlOverflowX;
      document.body.style.width = origBodyWidth;
      document.body.style.minWidth = origBodyMinWidth;
      document.documentElement.style.width = origHtmlWidth;
      document.documentElement.style.minWidth = origHtmlMinWidth;
    }
    
    function handlePdfError(err) {
      console.error(err);
      showLoading(false);
      restoreStyles();
      alert("Gagal memproses PDF: " + err.toString());
    }
  }).catch((err) => {
    console.error(err);
    showLoading(false);
    if (wrapper.parentNode) {
      wrapper.parentNode.removeChild(wrapper);
    }
    document.body.style.overflow = origBodyOverflow;
    document.body.style.overflowX = origBodyOverflowX;
    document.documentElement.style.overflow = origHtmlOverflow;
    document.documentElement.style.overflowX = origHtmlOverflowX;
    document.body.style.width = origBodyWidth;
    document.body.style.minWidth = origBodyMinWidth;
    document.documentElement.style.width = origHtmlWidth;
    document.documentElement.style.minWidth = origHtmlMinWidth;
    alert("Gagal memproses PDF: " + err.toString());
  });
}

        it.Price || 0,

  const allSteps = [
    { label: 'Prepared By (USER)', name: doc.signatures.user ? doc.signatures.user.name : '-' }
  ];
  
  steps.forEach(s => {
    let mappingKey;
    let label = s;
    if (doc.metadata.type === 'PD') {
      const mapping = {
        'Project Manager': 'deptHeadPm',
        'Finance': 'financeSite'
      };
      mappingKey = mapping[s];
      if (s === 'Project Manager') label = 'Dept Head / PM';
      if (s === 'Finance') label = 'Finance Site';
    } else {
      const mapping = {
        'Supervisor': 'supervisor',
        'Finance': 'finance',
        'Project Manager': 'projectManager'
      };
      mappingKey = mapping[s];
    }
    const sig = doc.signatures[mappingKey] || {};
    allSteps.push({ label: label, name: sig.name || 'PENDING' });
  });
  
  allSteps.forEach(step => {
    wsData.push([step.label + ":", step.name]);
  });

  // Build SheetJS Workbook
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  
  // Styling column widths
  const wscols = [
    {wch: 25},

    {wch: 25},
    {wch: 40},
    {wch: 15},
    {wch: 15},
    {wch: 15},
    {wch: 30}
  ];
  ws['!cols'] = wscols;

  XLSX.utils.book_append_sheet(wb, ws, doc.metadata.type + " Data");
  
  // Save Workbook
  XLSX.writeFile(wb, doc.metadata.docNumber.replace(/\//g, '_') + '.ods', { bookType: 'ods' });
  showToast('Dokumen ODF (.ods) berhasil diunduh.');
}

// Convert number to Indonesian words (Local version for client-side)
function terbilangLocal(num) {
  if (num === 0) return 'nol rupiah';
  const satuan = ['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan',
    'sepuluh','sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas',
    'tujuh belas','delapan belas','sembilan belas'];
  function group(n, suffix) {
    if (n === 0) return '';
    if (n < 20) return satuan[n] + (suffix ? ' ' + suffix : '') + ' ';
    if (n < 100) return satuan[Math.floor(n/10)] + ' puluh ' + (n%10 ? satuan[n%10]+' ' : '');
    
    let result = '';
    const r10 = Math.floor(n/10)%10, r1 = n%10, r100 = Math.floor(n/100);
    if(r100) {
      if (r100 === 1) result += 'seratus ';
      else result += satuan[r100] + ' ratus ';
    }
    if(r10 === 1) { result += satuan[10 + r1] + ' '; }
    else { if(r10) result += satuan[r10] + ' puluh '; if(r1) result += satuan[r1] + ' '; }
    return result + (suffix ? suffix + ' ' : '');
  }
  let n = Math.floor(num), result = '';
  const triliun = Math.floor(n / 1000000000000); n %= 1000000000000;
  const miliar = Math.floor(n / 1000000000); n %= 1000000000;
  const juta = Math.floor(n / 1000000); n %= 1000000;
  const ribu = Math.floor(n / 1000); n %= 1000;
  const sisa = n;
  if(triliun) result += group(triliun,'triliun');
  if(miliar) result += group(miliar,'miliar');
  if(juta) result += group(juta,'juta');
  if(ribu === 1) result += 'seribu '; else if(ribu) result += group(ribu,'ribu');
  if(sisa) result += group(sisa,'');
  return (result.trim() || 'nol') + ' rupiah';
}

function renderPDFToCanvases(base64Data, container) {
  if (!window.pdfjsLib) {
    container.textContent = 'PDF.js library not loaded.';
    return Promise.resolve();
  }
  
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  
  try {
    const pdfData = atob(base64Data.split(',')[1]);
    const loadingTask = pdfjsLib.getDocument({data: pdfData});
    return loadingTask.promise.then(function(pdf) {
      container.innerHTML = ''; // Clear loading message
      
      const renderPagePromises = [];
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const pagePromise = pdf.getPage(pageNum).then(function(page) {
          const viewport = page.getViewport({scale: 1.5});
          const canvas = document.createElement('canvas');
          canvas.style.display = 'block';
          canvas.style.margin = '20px auto';
          canvas.style.maxWidth = '100%';
          canvas.style.height = 'auto';
          canvas.style.boxShadow = '0 4px 10px rgba(0,0,0,0.1)';
          
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          
          const context = canvas.getContext('2d');
          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };
          
          return page.render(renderContext).promise.then(() => {
            container.appendChild(canvas);
          });
        });
        renderPagePromises.push(pagePromise);
      }
      return Promise.all(renderPagePromises);
    }).catch(err => {
      console.error(err);
      container.textContent = 'Gagal menampilkan PDF: ' + err.message;
    });
  } catch (e) {
    console.error(e);
    container.textContent = 'Gagal memproses file PDF.';
    return Promise.resolve();
  }
}

function checkApiConnection() {
  const isGAS = (typeof google !== 'undefined' && google.script && google.script.run && google.script.sandboxMode);
  if (!isGAS) {
    const owner = localStorage.getItem('github_owner');

      setTimeout(() => {

      }, 1000);
    } else {

      if (loginForm) loginForm.style.display = 'block';
    }
  }
}

async function saveApiSettings() {
  const owner = document.getElementById('api-github-owner').value.trim();
  const repo = document.getElementById('api-github-repo').value.trim();
  const branch = document.getElementById('api-github-branch').value.trim() || 'main';
  const token = document.getElementById('api-github-token').value.trim();
  
  if (!owner || !repo || !token) {
    alert('Harap lengkapi semua data Owner, Repository, dan Token!');
    return;
  }
  
  // Get button to show loading state
  const btn = document.querySelector('#api-settings-modal .modal-footer .submit');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menghubungkan...';
  
  try {
    // Attempt to test fetch m_users.json via API (try under 'db/' first)
    let dbPrefix = 'db/';
    let url = `https://api.github.com/repos/${owner}/${repo}/contents/db/m_users.json?ref=${branch}&t=${new Date().getTime()}`;
    let response = await fetch(url, {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3.raw'
      }
    });
    
    // If 'db/m_users.json' is not found, try the root folder as a fallback
    if (response.status === 404) {
      const rootUrl = `https://api.github.com/repos/${owner}/${repo}/contents/m_users.json?ref=${branch}&t=${new Date().getTime()}`;
      const rootResponse = await fetch(rootUrl, {
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3.raw'
        }
      });
      if (rootResponse.status === 200) {
        response = rootResponse;
        dbPrefix = '';
      }
    }
    
    if (response.status === 200) {
      await response.json(); // test parsing
      
      localStorage.setItem('github_owner', owner);
      localStorage.setItem('github_repo', repo);
      localStorage.setItem('github_branch', branch);
      localStorage.setItem('github_token', token);
      localStorage.setItem('github_db_prefix', dbPrefix);
      
      closeApiSettingsModal();
      const detectedLoc = dbPrefix ? "folder 'db/'" : "root folder";
      alert(`Koneksi database GitHub berhasil terhubung! (Terdeteksi di ${detectedLoc})\nMemuat ulang halaman...`);
      window.location.reload();
    } else if (response.status === 404) {
      alert(`Gagal terhubung ke GitHub!\n\nPesan: File 'm_users.json' tidak ditemukan (404) di folder 'db/' maupun di folder root.\n\nSolusi:\n1. Pastikan seluruh file JSON database (m_users.json, t_requests.json, dll.) sudah di-upload ke repositori Anda (bisa di folder 'db/' atau langsung di root folder).\n2. Pastikan penulisan nama repositori '${repo}' dan branch '${branch}' sudah benar.`);
    } else if (response.status === 401) {
      alert(`Gagal terhubung ke GitHub!\n\nPesan: Token tidak valid / salah (401).\n\nSolusi: Pastikan Personal Access Token (PAT) Anda benar dan belum expired.`);
    } else {
      alert(`Gagal terhubung ke GitHub! (Error ${response.status}: ${response.statusText})`);
    }
  } catch (err) {
    alert(`Gagal terhubung ke GitHub!\n\nPesan: ${err.message || err.toString()}\n\nSolusi: Periksa koneksi internet Anda atau pastikan nama Owner/Repo tidak mengandung spasi.`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = origText;
  }
}
